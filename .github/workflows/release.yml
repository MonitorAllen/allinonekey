name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}-${{ inputs.tag || '' }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve tag
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid SemVer tag: $tag" >&2
            exit 1
          fi
          version="${tag#v}"
          package_version=$(python3 -c "import json; print(json.load(open('web/package.json'))['version'])")
          if [ "$package_version" != "$version" ]; then
            echo "web/package.json version $package_version does not match tag $tag" >&2
            exit 1
          fi
          if ! grep -q "Current version: \`$version\`" README.md; then
            echo "README.md current version does not match $version" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'
          cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build frontend
        working-directory: web
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Build linux amd64 backend
        run: |
          mkdir -p dist/allinonekey-${{ needs.validate.outputs.version }}-linux-amd64
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags='-s -w' -o dist/allinonekey-${{ needs.validate.outputs.version }}-linux-amd64/allinone-server ./cmd/server/main.go
          cp -r web/dist dist/allinonekey-${{ needs.validate.outputs.version }}-linux-amd64/web
          cp README.md REQUIREMENTS.md .env.example docker-compose.yml Dockerfile docker-entrypoint.sh dist/allinonekey-${{ needs.validate.outputs.version }}-linux-amd64/
          tar -C dist -czf dist/allinonekey-${{ needs.validate.outputs.version }}-linux-amd64.tar.gz allinonekey-${{ needs.validate.outputs.version }}-linux-amd64

      - name: Generate checksums
        working-directory: dist
        run: sha256sum *.tar.gz > SHA256SUMS

      - name: Upload release artifacts
        uses: actions/upload-artifact@v5
        with:
          name: allinonekey-${{ needs.validate.outputs.version }}-release-artifacts
          path: |
            dist/*.tar.gz
            dist/SHA256SUMS
          if-no-files-found: error

  github-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs:
      - validate
      - build
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v6
        with:
          name: allinonekey-${{ needs.validate.outputs.version }}-release-artifacts
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          name: ${{ needs.validate.outputs.tag }}
          draft: true
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
