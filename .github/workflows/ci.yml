name: CI

on:
  push:
    branches:
      - master
      - 'feat/**'
      - 'fix/**'
      - 'chore/**'
      - 'ci/**'
      - 'docs/**'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend build and tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'
          cache: true

      - name: Verify gofmt
        run: |
          files=$(gofmt -l $(find . -path './web' -prune -o -name '*.go' -print))
          if [ -n "$files" ]; then
            echo "$files"
            exit 1
          fi

      - name: Download Go modules
        run: go mod download

      - name: Run Go tests
        run: go test ./...

      - name: Build backend
        run: go build -o /tmp/allinone-server ./cmd/server/main.go

  frontend:
    name: Frontend typecheck and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend
        run: bun run build

  smoke:
    name: Release smoke
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.0'
          cache: true

      - name: Run clean DB release smoke
        run: ./scripts/release_smoke.sh
